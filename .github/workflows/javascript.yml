name: JavaScript tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.313.0
      with:
        ruby-version: '4.0'
        bundler-cache: true
    - uses: pnpm/action-setup@v6.0.9
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - name: Install node dependencies
      run: pnpm install
    - name: Run tests
      run: bundle exec rake test:js
